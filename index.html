<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Dashboard | 数据监控平台</title>
    <meta name="description" content="AI 驱动的数据监控与可视化平台，支持智能图表生成与数据分析。">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- ECharts CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <!-- DOMPurify for XSS protection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="logo">数据监控平台</div>
            <div class="header-right">
                <div id="data-status" class="status-badge demo">状态: 检测中...</div>
                <div class="system-time" id="time">--:--:--</div>
                <button class="settings-toggle" onclick="toggleSettings()" id="settings-btn">
                    <span class="pulse-ring"></span>
                    ⚙️
                </button>
            </div>
        </header>

        <aside class="left-panel history-sidebar">
            <div class="history-header">
                <h3>💬 对话数据纪要</h3>
                <button class="clear-history-btn" onclick="clearHistory()" title="清空记录">🗑️</button>
            </div>
            <div id="history-list" class="history-list">
                <div class="history-empty">暂无历史记录</div>
            </div>
        </aside>

        <main class="main-content">
            <div id="dynamic-chart-area">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <h3>告诉 AI 你想看什么数据</h3>
                    <p>例如："帮我查一下近5年的新能源汽车销量并画个图"</p>
                    <div class="empty-state-hints">
                        <span class="hint-chip" onclick="sendMessage('近5年中国GDP增长趋势')">📈 GDP趋势</span>
                        <span class="hint-chip" onclick="sendMessage('2024年各省人口排名前10')">👥 人口排名</span>
                        <span class="hint-chip" onclick="sendMessage('全球新能源汽车销量对比')">🚗 新能源汽车</span>
                    </div>
                </div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="data-card">
                <div class="card-title">🌍 数据来源</div>
                <div class="card-text" id="card-source-name" style="color: var(--neon-blue); font-weight: 600;">暂无数据源</div>
                <a id="card-source-link" href="#" target="_blank" class="source-link" style="display: none;">查看原文链接 &rarr;</a>
            </div>

            <div class="data-card summary-card">
                <div class="card-title">📝 数据总结</div>
                <div class="card-text scrollable-text" id="card-summary">暂无总结。向 AI 提问以获取最新数据分析。</div>
            </div>

            <div class="data-card analysis-card">
                <div class="card-title">💡 深度分析</div>
                <div class="card-text scrollable-text" id="card-analysis">暂无分析。</div>
            </div>
        </aside>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">AI 智能助理 <span id="active-model-display" style="font-size: 0.7rem; opacity: 0.6; font-weight: normal; margin-left: 5px;"></span></div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="model-select" class="model-dropdown">
                    <!-- Automatically populated with the configured model -->
                </select>
                <button class="new-chat-btn" onclick="newConversation()" title="新对话">🔄</button>
                <button class="toggle-chat-btn" onclick="toggleChat()" id="chat-toggle-icon">_</button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message assistant"><div class="msg-content">你好！我是 AI 助理。你可以向我咨询数据或让我生成图表。</div></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()" id="send-btn">发送</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>系统配置</h3>
                <button class="close-btn" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="server-key-status" class="server-key-banner" style="display:none;">
                    ✅ 服务端已配置 API Key，以下设置为可选覆盖。
                </div>
                <section>
                    <h4>AI 模型配置</h4>
                    <div class="input-group">
                        <label>OpenAI 兼容端点 (Endpoint)</label>
                        <input type="text" id="ai-endpoint" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="input-group">
                        <label>API Key</label>
                        <input type="password" id="ai-key" placeholder="sk-...">
                    </div>
                    <div class="input-group">
                        <label>模型名称 (Model)</label>
                        <input type="text" id="ai-model" placeholder="gpt-4o">
                    </div>
                </section>
                <button class="save-btn" onclick="saveSettings()">保存并运行</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
