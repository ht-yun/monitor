# AI Monitor - Nginx Configuration
# Place at: /etc/nginx/sites-available/ai-monitor
# Then: ln -s /etc/nginx/sites-available/ai-monitor /etc/nginx/sites-enabled/

upstream ai_monitor_backend {
    server 127.0.0.1:8081;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL - replace with your cert paths
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static files (served directly by nginx for performance)
    location /static/ {
        alias /opt/monitor/ai_monitor/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Generated files
    location /api/report/download/ {
        proxy_pass http://ai_monitor_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/ppt-generator/download/ {
        proxy_pass http://ai_monitor_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API proxy
    location /api/ {
        proxy_pass http://ai_monitor_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Frontend SPA
    location / {
        proxy_pass http://ai_monitor_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
