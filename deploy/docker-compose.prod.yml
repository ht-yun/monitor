version: "3.8"

name: ai-monitor

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-monitor-db
    environment:
      POSTGRES_DB: ai_monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD:     volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d ai_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-monitor-app
    ports:
      - "127.0.0.1:8081:8081"
    env_file:
      - .env
    environment:
      - AIMONITOR_DATABASE_URL=postgresql+asyncpg://monitor:\@postgres:5432/ai_monitor
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - generated_reports:/app/ai_monitor/generated_reports
      - generated_ppts:/app/ai_monitor/generated_ppts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: ai-monitor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ai_monitor/static:/opt/monitor/ai_monitor/static:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - ai-monitor
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: ai-monitor-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"

volumes:
  postgres_data:
  generated_reports:
  generated_ppts:
  certbot_data:
  certbot_www:
